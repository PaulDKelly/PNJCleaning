{% extends "base.html" %}

{% block auth_content %}
<div class="w-full max-w-md">
    <div class="glass-card rounded-3xl shadow-2xl overflow-hidden border border-white/20 p-8 space-y-8">
        <div class="text-center space-y-2">
            <h2 class="text-3xl font-bold text-slate-800 font-outfit">Forgot Password?</h2>
            <p class="text-slate-500">Enter your email and we'll log a reset link to the console.</p>
        </div>

        {% if message %}
        <div class="alert alert-info py-3 text-sm">
            <span>{{ message }}</span>
        </div>
        {% endif %}

        <form action="/forgot-password" method="POST" class="space-y-6">
            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold">Email Address</span>
                </label>
                <input type="email" name="email" placeholder="email@example.com"
                    class="input input-bordered focus:input-primary transition-all duration-300" required />
            </div>

            <button type="submit" class="btn btn-primary btn-block rounded-2xl h-14 shadow-lg shadow-primary/20">Send
                Reset Link</button>

            <div class="text-center">
                <a href="/login" class="text-sm font-semibold text-slate-400 hover:text-primary transition-colors">Back
                    to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
