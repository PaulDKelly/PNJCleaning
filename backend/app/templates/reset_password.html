{% extends "base.html" %}

{% block auth_content %}
<div class="w-full max-w-md">
    <div class="glass-card rounded-3xl shadow-2xl overflow-hidden border border-white/20 p-8 space-y-8">
        <div class="text-center space-y-2">
            <h2 class="text-3xl font-bold text-slate-800 font-outfit">Reset Password</h2>
            <p class="text-slate-500">Please enter your new secure password.</p>
        </div>

        <form action="/reset-password/{{ token }}" method="POST" class="space-y-6">
            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold">New Password</span>
                </label>
                <input type="password" name="password" placeholder="••••••••"
                    class="input input-bordered focus:input-primary transition-all duration-300" required
                    minlength="8" />
            </div>

            <button type="submit" class="btn btn-primary btn-block rounded-2xl h-14 shadow-lg shadow-primary/20">Update
                Password</button>
        </form>
    </div>
</div>
{% endblock %}
